<div style="display: flex; flex-direction: column; align-items: center; margin-top: 100px; font-family: sans-serif;">
  <h2>🔐 Login do Sistema Test PH</h2>
  <div style="border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <div style="margin-bottom: 10px;">
      <label>Usuário:</label><br>
      <input type="text" #usuario placeholder="Digite admin">
    </div>
    <div style="margin-bottom: 20px;">
      <label>Senha:</label><br>
      <input type="password" #senha (keyup.enter)="logar(usuario.value, senha.value)" placeholder="Digite senha">
        </div>
    <button (click)="logar(usuario.value, senha.value)" style="width: 100%; padding: 8px; cursor: pointer;">
      Entrar
    </button>
  </div>
</div>
