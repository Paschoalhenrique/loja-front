<div style="padding: 20px; font-family: sans-serif;">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2>📦 Sistema de Gestão de Produtos PH</h2>
  </div>

  <hr style="margin-bottom: 20px;">

  <div style="display: flex; justify-content: flex-end; width: 80%; margin: 0 auto 15px auto;">
    <button (click)="irParaCadastro()"
            style="background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
      + Novo Produto
    </button>
  </div>

  <table border="1" style="width: 80%; margin: auto; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th style="padding: 10px;">ID</th>
        <th style="padding: 10px;">Nome</th>
        <th style="padding: 10px;">Preço</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of produtos">
        <td style="padding: 8px; text-align: center;">{{ p.id }}</td>
        <td style="padding: 8px;">{{ p.nome }}</td>
        <td style="padding: 8px; text-align: right;">{{ p.preco | currency:'BRL' }}</td>
      </tr>
    </tbody>
  </table>

  <button class="btn-sair" (click)="deslogar()">
    Sair
  </button>
</div>
